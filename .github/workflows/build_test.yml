name: build test

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: install packages
        run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm build

      - name: checksum
        run: |
          ACTUAL=$(find dist/ -type f -exec sha1sum {} + | sort | sha1sum | cut -d ' ' -f 1)
          echo "actual:   $ACTUAL"
          echo "expected: $EXPECTED_CHECKSUM"
          test "$ACTUAL" = "$EXPECTED_CHECKSUM"
        env:
          EXPECTED_CHECKSUM: "b10dc4b921c2e9e2e012948cf83a2e806a9e8ed9"
